version: '3.8'

services:
  api:
    build: .
    ports:
      - '3001:3000'
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/blog
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
